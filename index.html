<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ジオフェンス警告</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="start-screen">
    <div>
      <button id="start-button" type="button">開始</button>
      <div id="error-message"></div>

      <details id="settings-panel">
        <summary>設定（ローカル保存）</summary>
        <div class="settings-body">
          <h4>警告距離 (m)</h4>
          <label>警告 (境界まで) <input id="s-warning-m" type="number" step="1" min="0"></label>
          <label>危険 (境界まで) <input id="s-danger-inside-m" type="number" step="1" min="0"></label>

          <h4>時間予測</h4>
          <label>警告TBB (秒) <input id="s-warning-ttb-s" type="number" step="1" min="0"></label>
          <label>最小速度 (m/s) <input id="s-min-speed-mps" type="number" step="0.1" min="0"></label>

          <h4>GPS精度</h4>
          <label>精度警告閾値 (m) <input id="s-accuracy-warn-m" type="number" step="1" min="0"></label>

          <h4>ビープ音</h4>
          <label>警告 周波数 (Hz) <input id="s-warning-freq-hz" type="number" step="10" min="100"></label>
          <label>警告 間隔 (ms) <input id="s-warning-interval-ms" type="number" step="100" min="100"></label>
          <label>危険 周波数 (Hz) <input id="s-danger-freq-hz" type="number" step="10" min="100"></label>

          <h4>ジオフェンスデータ</h4>
          <div id="s-geojson-status"></div>
          <label>GeoJSONをアップロード <input id="s-geojson-file" type="file" accept=".geojson,.json"></label>
          <button id="s-geojson-clear" type="button">デフォルトに戻す</button>

          <div class="settings-actions">
            <button id="s-save" type="button">設定を保存</button>
            <button id="s-reset" type="button">デフォルトに戻す</button>
            <span id="s-save-status"></span>
          </div>
        </div>
      </details>

      <details id="debug-panel">
        <summary>デバッグモード(位置・方位を手動入力)</summary>
        <p>
          <label>緯度 <input id="debug-lat" type="number" step="any" placeholder="35.649813"></label><br>
          <label>経度 <input id="debug-lon" type="number" step="any" placeholder="139.794699"></label><br>
          <label>方位(度) <input id="debug-heading" type="range" min="0" max="359" value="0"></label>
          <span id="debug-heading-value">0</span>°<br>
          <label>速度(m/s) <input id="debug-speed" type="range" min="0" max="10" step="0.1" value="1.4"></label>
          <span id="debug-speed-value">1.4</span> m/s
        </p>
        <label><input id="debug-enable" type="checkbox"> 手動入力を使う</label>
      </details>
    </div>
  </div>

  <div id="status-screen">
    <div id="accuracy-notice">GPS精度低下中</div>
    <div id="state-label"></div>
    <div id="direction-arrow">↑</div>
    <div>
      <span id="distance">--</span>
      <span id="distance-label">m (最も近い境界まで)</span>
    </div>
  </div>

  <div id="version-label">__COMMIT_SHA__</div>
  <script type="module" src="app.js"></script>
</body>
</html>
